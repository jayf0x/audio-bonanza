<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Bonanza</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="title">Audio Bonanza</div>
    </header>

    <div id="status" class="status status--hidden"></div>

    <section class="section" style="--delay: 80ms">
      <div class="preset-grid">
        <div class="preset-item" data-preset="a">
          <input class="preset-name" data-preset="a" type="text" value="Slot A" maxlength="20" spellcheck="false" autocomplete="off" />
          <button class="preset-save" data-preset="a" disabled title="Save current settings to Slot A">💾</button>
        </div>
        <div class="preset-item" data-preset="b">
          <input class="preset-name" data-preset="b" type="text" value="Slot B" maxlength="20" spellcheck="false" autocomplete="off" />
          <button class="preset-save" data-preset="b" disabled title="Save current settings to Slot B">💾</button>
        </div>
        <div class="preset-item" data-preset="off">
          <button class="preset-apply" data-preset="off">Off</button>
        </div>
      </div>
    </section>

    <section class="section controls-section" style="--delay: 140ms">
      <div class="control">
        <div class="control-label-row">
          <span class="control-label">Speed</span>
          <span class="control-value" id="playback-rate-value">0.80x</span>
        </div>
        <input type="range" id="playback-rate" min="0.5" max="1.5" step="any" value="0.8" />
      </div>

      <div class="control">
        <div class="control-label-row">
          <span class="control-label">Reverb</span>
          <span class="control-value" id="reverb-amount-value">40%</span>
        </div>
        <input type="range" id="reverb-amount" min="0" max="1.5" step="any" value="0.4" />
      </div>

      <div class="control">
        <div class="control-label-row">
          <span class="control-label">Bass Boost</span>
          <span class="control-value" id="low-band-decibels-value">0.0 dB</span>
        </div>
        <input type="range" id="low-band-decibels" min="0" max="10" step="any" value="0" />
      </div>

      <div class="control">
        <div class="control-label-row">
          <span class="control-label">Delay</span>
          <span class="control-value" id="delay-time-value">0 ms</span>
        </div>
        <input type="range" id="delay-time" min="0" max="1" step="any" value="0" />
      </div>

      <div class="control">
        <div class="control-label-row">
          <span class="control-label">Delay Echo</span>
          <span class="control-value" id="delay-feedback-value">0%</span>
        </div>
        <input type="range" id="delay-feedback" min="0" max="0.8" step="any" value="0" />
      </div>

      <div class="control">
        <div class="control-label-row">
          <span class="control-label">Delay Wet</span>
          <span class="control-value" id="delay-wet-value">40%</span>
        </div>
        <input type="range" id="delay-wet" min="0" max="1" step="any" value="0.4" />
      </div>

      <div class="control">
        <div class="control-label-row">
          <span class="control-label">Volume</span>
          <span class="control-value" id="volume-value">100%</span>
        </div>
        <input type="range" id="volume" min="0" max="2" step="any" value="1" />
      </div>

      <label class="toggle" for="preserve-pitch">
        <input type="checkbox" id="preserve-pitch" />
        <span class="toggle-track">
          <span class="toggle-thumb"></span>
        </span>
        <span class="toggle-text">Preserve Pitch</span>
      </label>

      <div class="control eq-control">
        <div class="control-label-row">
          <span class="control-label">EQ</span>
        </div>
        <div class="eq-grid">
          <div class="eq-band">
            <span class="eq-value" data-eq="0">0</span>
            <input type="range" class="eq-slider" data-eq="0" min="-12" max="12" step="any" value="0" />
            <span class="eq-label">63</span>
          </div>
          <div class="eq-band">
            <span class="eq-value" data-eq="1">0</span>
            <input type="range" class="eq-slider" data-eq="1" min="-12" max="12" step="any" value="0" />
            <span class="eq-label">125</span>
          </div>
          <div class="eq-band">
            <span class="eq-value" data-eq="2">0</span>
            <input type="range" class="eq-slider" data-eq="2" min="-12" max="12" step="any" value="0" />
            <span class="eq-label">250</span>
          </div>
          <div class="eq-band">
            <span class="eq-value" data-eq="3">0</span>
            <input type="range" class="eq-slider" data-eq="3" min="-12" max="12" step="any" value="0" />
            <span class="eq-label">500</span>
          </div>
          <div class="eq-band">
            <span class="eq-value" data-eq="4">0</span>
            <input type="range" class="eq-slider" data-eq="4" min="-12" max="12" step="any" value="0" />
            <span class="eq-label">1k</span>
          </div>
          <div class="eq-band">
            <span class="eq-value" data-eq="5">0</span>
            <input type="range" class="eq-slider" data-eq="5" min="-12" max="12" step="any" value="0" />
            <span class="eq-label">2k</span>
          </div>
          <div class="eq-band">
            <span class="eq-value" data-eq="6">0</span>
            <input type="range" class="eq-slider" data-eq="6" min="-12" max="12" step="any" value="0" />
            <span class="eq-label">4k</span>
          </div>
          <div class="eq-band">
            <span class="eq-value" data-eq="7">0</span>
            <input type="range" class="eq-slider" data-eq="7" min="-12" max="12" step="any" value="0" />
            <span class="eq-label">8k</span>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script src="./popup.js"></script>
</body>
</html>
