<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="{{ url_for('static', filename='qrious.min.js') }}"></script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f141b;
        --panel: #161f2a;
        --panel-2: #1c2735;
        --text: #eef4ff;
        --muted: #9fb2c8;
        --accent: #4dd8c8;
        --warn: #ff8966;
        --border: rgba(255, 255, 255, 0.08);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Avenir Next", "Avenir", "Futura", "Trebuchet MS", sans-serif;
        background: radial-gradient(circle at top, rgba(77, 216, 200, 0.12), transparent 55%),
          linear-gradient(160deg, #0b0f14, var(--bg));
        color: var(--text);
        min-height: 100vh;
        padding: 20px;
      }

      .page {
        max-width: 920px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-end;
      }

      .title {
        font-size: 22px;
        font-weight: 600;
      }

      .subtitle {
        font-size: 12px;
        color: var(--muted);
        margin-top: 4px;
      }

      .qr-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 11px;
      }

      #qr_link {
        width: 140px;
        height: 140px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--panel);
      }

      .tabs {
        display: grid;
        gap: 12px;
      }

      .tab-card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px 16px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 14px;
      }

      .tab-meta {
        display: flex;
        flex-direction: column;
        gap: 6px;
        min-width: 0;
      }

      .tab-title {
        font-size: 14px;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .tab-host {
        font-size: 11px;
        color: var(--muted);
      }

      .status {
        font-size: 10px;
        letter-spacing: 0.7px;
        text-transform: uppercase;
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid rgba(77, 216, 200, 0.35);
        color: var(--accent);
        width: fit-content;
      }

      .status.muted {
        border-color: rgba(255, 137, 102, 0.45);
        color: var(--warn);
      }

      .actions {
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-width: 140px;
      }

      .btn {
        border-radius: 10px;
        border: 1px solid transparent;
        padding: 8px 10px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.7px;
        background: var(--panel-2);
        color: var(--text);
        cursor: pointer;
        transition: transform 120ms ease, border-color 120ms ease;
      }

      .btn:hover {
        transform: translateY(-1px);
        border-color: rgba(77, 216, 200, 0.35);
      }

      .btn.play {
        background: rgba(77, 216, 200, 0.18);
        color: #7cf3de;
      }

      .btn.pause {
        background: rgba(255, 137, 102, 0.18);
        color: var(--warn);
      }

      .btn[disabled] {
        opacity: 0.55;
        cursor: default;
        transform: none;
      }

      .empty {
        padding: 24px;
        border-radius: 14px;
        border: 1px dashed var(--border);
        color: var(--muted);
        text-align: center;
        background: rgba(21, 28, 38, 0.5);
      }

      @media (max-width: 720px) {
        header {
          flex-direction: column;
          align-items: flex-start;
        }

        .tab-card {
          grid-template-columns: 1fr;
        }

        .actions {
          flex-direction: row;
          min-width: 0;
        }

        .btn {
          flex: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header>
        <div>
          <div class="title">Audio Bonanza Remote</div>
          <div class="subtitle">Play or pause tabs on this machine.</div>
        </div>
        <div class="qr-wrap">
          <span>Open on another device</span>
          <img id="qr_link" alt="QR code" />
        </div>
      </header>

      <div id="tabs" class="tabs"></div>
      <div id="empty" class="empty" hidden>No controllable tabs yet.</div>
    </div>

    <script>
      const token = "{{ token }}";
      const tabsEl = document.getElementById("tabs");
      const emptyEl = document.getElementById("empty");
      const pending = new Map();
      let lastTabs = [];

      function getHost(url) {
        if (!url) return "";
        try {
          return new URL(url).host;
        } catch (error) {
          return url;
        }
      }

      function getStatus(tab) {
        if (tab.muted) {
          return { label: "Muted", className: "status muted" };
        }
        if (tab.audible) {
          return { label: "Playing", className: "status" };
        }
        return { label: "Paused", className: "status" };
      }

      function sendCommand(tabId, action) {
        return fetch("/cmd", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-API-Token": token,
          },
          body: JSON.stringify({ tabId, action }),
        });
      }

      function queueAction(tabId, action) {
        pending.set(tabId, action);
        renderTabs(lastTabs);

        sendCommand(tabId, action).catch(() => {
          pending.delete(tabId);
          renderTabs(lastTabs);
        });

        setTimeout(() => {
          if (pending.get(tabId) === action) {
            pending.delete(tabId);
            renderTabs(lastTabs);
          }
        }, 2000);
      }

      function renderTabs(tabs) {
        tabsEl.innerHTML = "";
        emptyEl.hidden = tabs.length > 0;

        tabs.forEach((tab) => {
          const card = document.createElement("div");
          card.className = "tab-card";

          const meta = document.createElement("div");
          meta.className = "tab-meta";

          const title = document.createElement("div");
          title.className = "tab-title";
          title.textContent = tab.title || "Untitled Tab";
          title.title = tab.title || "Untitled Tab";

          const host = document.createElement("div");
          host.className = "tab-host";
          host.textContent = getHost(tab.url);
          host.title = tab.url || "";

          const status = document.createElement("div");
          const statusInfo = getStatus(tab);
          status.className = statusInfo.className;
          status.textContent = statusInfo.label;

          meta.appendChild(title);
          meta.appendChild(host);
          meta.appendChild(status);

          const actions = document.createElement("div");
          actions.className = "actions";

          const isPlaying = tab.audible && !tab.muted;
          const pendingAction = pending.get(tab.id);

          const playBtn = document.createElement("button");
          playBtn.className = "btn play";
          playBtn.textContent = "Play";
          playBtn.disabled = isPlaying || pendingAction === "play";
          playBtn.addEventListener("click", () => queueAction(tab.id, "play"));

          const pauseBtn = document.createElement("button");
          pauseBtn.className = "btn pause";
          pauseBtn.textContent = "Pause";
          pauseBtn.disabled = !isPlaying || pendingAction === "pause";
          pauseBtn.addEventListener("click", () => queueAction(tab.id, "pause"));

          actions.appendChild(playBtn);
          actions.appendChild(pauseBtn);

          card.appendChild(meta);
          card.appendChild(actions);
          tabsEl.appendChild(card);
        });
      }

      function connectTabsStream() {
        const evt = new EventSource("/tab-events");
        evt.onmessage = (event) => {
          const msg = JSON.parse(event.data);
          if (msg.type === "tabs") {
            lastTabs = Array.isArray(msg.tabs) ? msg.tabs : [];
            renderTabs(lastTabs);
          }
        };
        evt.onerror = () => {
          evt.close();
          setTimeout(connectTabsStream, 1500);
        };
      }

      new QRious({
        element: document.getElementById("qr_link"),
        size: 140,
        value: location.origin + "?token={{ token }}",
      });

      connectTabsStream();
    </script>
  </body>
</html>
