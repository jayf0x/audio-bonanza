<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Yes everything if offline available! -->
    <script src="{{ url_for('static', filename='qrious.min.js') }}"></script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f141b;
        --panel: #161f2a;
        --panel-2: #1c2735;
        --text: #eef4ff;
        --muted: #9fb2c8;
        --accent: #4dd8c8;
        --accent-strong: #7cf3de;
        --warn: #ff8966;
        --border: rgba(255, 255, 255, 0.08);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Avenir Next", "Avenir", "Futura", "Trebuchet MS", sans-serif;
        background: radial-gradient(circle at top, rgba(77, 216, 200, 0.12), transparent 55%),
          linear-gradient(160deg, #0b0f14, var(--bg));
        color: var(--text);
        min-height: 100vh;
        padding: 20px;
      }

      .page {
        max-width: 980px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      header {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        align-items: flex-end;
      }

      .title {
        font-size: 22px;
        font-weight: 600;
      }

      .subtitle {
        font-size: 12px;
        color: var(--muted);
        margin-top: 4px;
      }

      .search-wrap {
        display: flex;
        flex-direction: column;
        gap: 10px;
        align-items: flex-end;
      }

      .search-label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--muted);
      }

      .search-input {
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        padding: 8px 10px;
        font-size: 12px;
        width: 240px;
      }

      .chips {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .chip {
        border-radius: 999px;
        border: 1px solid var(--border);
        padding: 4px 10px;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        background: rgba(255, 255, 255, 0.02);
        color: var(--muted);
        cursor: pointer;
      }

      .chip.is-active {
        border-color: rgba(77, 216, 200, 0.5);
        color: var(--accent-strong);
        background: rgba(77, 216, 200, 0.15);
      }

      .qr-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 11px;
      }

      #qr_link {
        width: 140px;
        height: 140px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--panel);
        padding: 0.1rem;
      }

      .tabs {
        display: grid;
        gap: 12px;
      }

      .tab-card {
        background-color: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px 16px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 14px;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      .tab-card.has-preview {
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
      }

      .tab-meta {
        display: flex;
        flex-direction: column;
        gap: 6px;
        min-width: 0;
      }

      .tab-title {
        font-size: 14px;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .tab-host {
        font-size: 11px;
        color: var(--muted);
      }

      .status {
        font-size: 10px;
        letter-spacing: 0.7px;
        text-transform: uppercase;
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid rgba(77, 216, 200, 0.35);
        color: var(--accent);
        width: fit-content;
        background: rgba(15, 20, 27, 0.55);
      }

      .status.muted {
        border-color: rgba(255, 137, 102, 0.45);
        color: var(--warn);
      }

      .actions {
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-width: 140px;
      }

      .btn {
        border-radius: 10px;
        border: 1px solid transparent;
        padding: 8px 10px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.7px;
        background: var(--panel-2);
        color: var(--text);
        cursor: pointer;
        transition: transform 120ms ease, border-color 120ms ease;
      }

      .btn:hover {
        transform: translateY(-1px);
        border-color: rgba(77, 216, 200, 0.35);
      }

      .btn.play {
        background: rgba(77, 216, 200, 0.18);
        color: var(--accent-strong);
      }

      .btn.pause {
        background: rgba(255, 137, 102, 0.18);
        color: var(--warn);
      }

      .btn[disabled] {
        opacity: 0.55;
        cursor: default;
        transform: none;
      }

      .empty {
        padding: 24px;
        border-radius: 14px;
        border: 1px dashed var(--border);
        color: var(--muted);
        text-align: center;
        background: rgba(21, 28, 38, 0.5);
      }

      @media (max-width: 820px) {
        header {
          flex-direction: column;
          align-items: flex-start;
        }

        .search-wrap {
          width: 100%;
          align-items: flex-start;
        }

        .search-input {
          width: 100%;
        }

        .chips {
          justify-content: flex-start;
        }
      }

      @media (max-width: 720px) {
        .tab-card {
          grid-template-columns: 1fr;
        }

        .actions {
          flex-direction: row;
          min-width: 0;
        }

        .btn {
          flex: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script type="module">
      import { h, render } from "/static/preact.mjs";
      import { useEffect, useMemo, useRef, useState } from "/static/hooks.mjs";
      import htm from "/static/htm.mjs";

      const html = htm.bind(h);
      const PRESET_FILTERS = [
        { label: "YouTube", query: "youtube" },
        { label: "Spotify", query: "spotify" },
        { label: "Twitch", query: "twitch" },
        { label: "Netflix", query: "netflix" },
      ];

      function getHost(url) {
        if (!url) return "";
        try {
          return new URL(url).host;
        } catch (error) {
          return url;
        }
      }

      function getYouTubeId(url) {
        if (!url) return "";
        try {
          const parsed = new URL(url);
          const host = parsed.hostname.replace(/^www\./, "");
          if (host === "youtu.be") {
            return parsed.pathname.split("/").filter(Boolean)[0] || "";
          }
          if (!host.endsWith("youtube.com")) {
            return "";
          }
          const fromQuery = parsed.searchParams.get("v");
          if (fromQuery) return fromQuery;
          const parts = parsed.pathname.split("/").filter(Boolean);
          if (parts[0] === "shorts" || parts[0] === "embed" || parts[0] === "live" || parts[0] === "v") {
            return parts[1] || "";
          }
          return "";
        } catch (error) {
          return "";
        }
      }

      function getStatus(tab) {
        if (tab.muted) {
          return { label: "Muted", className: "status muted" };
        }
        if (tab.audible) {
          return { label: "Playing", className: "status" };
        }
        return { label: "Paused", className: "status" };
      }

      function App() {
        const [tabs, setTabs] = useState([]);
        const [search, setSearch] = useState("");
        const [pendingById, setPendingById] = useState({});
        const timeoutRef = useRef(new Map());

        useEffect(()=>{
          setTimeout(()=>{
          new QRious({
              element: document.getElementById("qr_link"),
              size: Math.max(window.outerWidth, 140),
              value: location.origin + "?token={{ token }}",
            });
          }, 500)
        },[])

        useEffect(() => {
          let active = true;
          let evt = null;

          const connect = () => {
            if (!active) return;
            if (evt) evt.close();
            evt = new EventSource("/tab-events");
            evt.onmessage = (event) => {
              const msg = JSON.parse(event.data);
              if (msg.type === "tabs") {
                setTabs(Array.isArray(msg.tabs) ? msg.tabs : []);
              }
            };
            evt.onerror = () => {
              if (!evt) return;
              evt.close();
              evt = null;
              setTimeout(connect, 1500);
            };
          };

          connect();

          return () => {
            active = false;
            if (evt) evt.close();
          };
        }, []);

        useEffect(() => {
          setPendingById((prev) => {
            let changed = false;
            const next = { ...prev };
            tabs.forEach((tab) => {
              const pendingAction = next[tab.id];
              if (!pendingAction) return;
              const isPlaying = tab.audible && !tab.muted;
              if (pendingAction === "play" && isPlaying) {
                delete next[tab.id];
                changed = true;
              }
              if (pendingAction === "pause" && !isPlaying) {
                delete next[tab.id];
                changed = true;
              }
            });
            return changed ? next : prev;
          });
        }, [tabs]);

        function sendCommand(tabId, action) {
          return fetch("/cmd", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-API-Token": "{{ token }}",
            },
            body: JSON.stringify({ tabId, action }),
          });
        }

        function queueAction(tabId, action) {
          setPendingById((prev) => ({ ...prev, [tabId]: action }));

          if (timeoutRef.current.has(tabId)) {
            clearTimeout(timeoutRef.current.get(tabId));
          }

          timeoutRef.current.set(
            tabId,
            setTimeout(() => {
              setPendingById((prev) => {
                if (prev[tabId] !== action) {
                  return prev;
                }
                const next = { ...prev };
                delete next[tabId];
                return next;
              });
            }, 2000)
          );

          sendCommand(tabId, action).catch(() => {
            setPendingById((prev) => {
              if (prev[tabId] !== action) {
                return prev;
              }
              const next = { ...prev };
              delete next[tabId];
              return next;
            });
          });
        }

        function togglePreset(query) {
          setSearch((prev) => (prev.toLowerCase() === query.toLowerCase() ? "" : query));
        }

        const filteredTabs = useMemo(() => {
          const query = search.trim().toLowerCase();
          if (!query) return tabs;
          return tabs.filter((tab) => {
            const title = tab.title || "";
            const url = tab.url || "";
            return (
              title.toLowerCase().includes(query) ||
              url.toLowerCase().includes(query)
            );
          });
        }, [tabs, search]);

        const emptyLabel = useMemo(() => {
          if (tabs.length === 0) {
            return "No controllable tabs yet.";
          }
          if (filteredTabs.length === 0) {
            return "No matching tabs.";
          }
          return "";
        }, [tabs, filteredTabs]);

        return html`
          <div class="page">
            <header>
              <div>
                <div class="title">Audio Bonanza Remote</div>
                <div class="subtitle">Play or pause tabs on this machine.</div>
              </div>
              <div class="search-wrap">
                <span class="search-label">Search tabs</span>
                <input
                  class="search-input"
                  value=${search}
                  onInput=${(event) => setSearch(event.target.value)}
                  placeholder="Title or URL"
                />
                <div class="chips">
                  ${PRESET_FILTERS.map(
                    (preset) => html`
                      <button
                        class=${"chip" +
                        (search.toLowerCase() === preset.query.toLowerCase() ? " is-active" : "")}
                        onClick=${() => togglePreset(preset.query)}
                        type="button"
                      >
                        ${preset.label}
                      </button>
                    `
                  )}
                </div>
              </div>
              <div class="qr-wrap">
                <span>Open on another device</span>
                <img id="qr_link" alt="QR code" />
              </div>
            </header>

            <div class="tabs">
              ${filteredTabs.map((tab) => {
                const isPlaying = tab.audible && !tab.muted;
                const pendingAction = pendingById[tab.id];
                const status = getStatus(tab);
                const ytId = getYouTubeId(tab.url);
                const backgroundStyle = ytId
                  ? {
                      backgroundImage: `linear-gradient(120deg, rgba(15, 20, 27, 0.92), rgba(15, 20, 27, 0.55)), url(http://img.youtube.com/vi/${ytId}/0.jpg)`,
                    }
                  : null;

                return html`
                  <div
                    key=${tab.id}
                    class=${"tab-card" + (ytId ? " has-preview" : "")}
                    style=${backgroundStyle}
                  >
                    <div class="tab-meta">
                      <div class="tab-title" title=${tab.title || "Untitled Tab"}>
                        ${tab.title || "Untitled Tab"}
                      </div>
                      <div class="tab-host" title=${tab.url || ""}>
                        ${getHost(tab.url)}
                      </div>
                      <div class=${status.className}>${status.label}</div>
                    </div>
                    <div class="actions">
                      <button
                        class="btn play"
                        disabled=${isPlaying || pendingAction === "play"}
                        onClick=${() => queueAction(tab.id, "play")}
                      >
                        Play
                      </button>
                      <button
                        class="btn pause"
                        disabled=${!isPlaying || pendingAction === "pause"}
                        onClick=${() => queueAction(tab.id, "pause")}
                      >
                        Pause
                      </button>
                    </div>
                  </div>
                `;
              })}
            </div>

            ${emptyLabel
              ? html`<div class="empty">${emptyLabel}</div>`
              : null}
          </div>
        `;
      }

      render(html`<${App} />`, document.getElementById("app"));
    </script>
  </body>
</html>
